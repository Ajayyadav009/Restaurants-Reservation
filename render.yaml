services:
  # Backend Web Service
  - type: web
    name: restaurant-reservation-backend
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        value: https://restaurants-reservation-1.onrender.com
      - key: PORT
        value: 5000

  # Frontend Static Site
  - type: static
    name: restaurant-reservation-frontend
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
